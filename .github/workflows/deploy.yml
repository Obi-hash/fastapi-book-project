name: Deploy Application

on:
  push:
    branches:
      - main  # Triggers only when a PR is merged into main

jobs:
  deploy:
    name: Deploy FastAPI App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy Application
        run: |
          echo "Deploying FastAPI App..."

      - name: Build Docker Image
        run: docker build -t fastapi-app .

      - name: Run Docker Container
        run: docker run -d -p 8000:8000 fastapi-app

          # Add your deployment commands here, e.g., restarting a server, pushing to a cloud provider, etc.

